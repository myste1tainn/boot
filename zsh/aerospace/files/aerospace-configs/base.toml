# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Start AeroSpace at login
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[workspace-to-monitor-force-assignment]
# TODO: Gonna have to create 2 separate config with hamperspoon
# one for physical monitors and one for VITURE SpaceWalker
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'secondary'
5 = 'secondary'
6 = 'secondary'
# 7 = 'Dummy.*2'
# 8 = 'Dummy.*2'
# 9 = 'secondary'
# 2 = ['secondary', 'dell']        # You can specify multiple patterns.

# [[on-window-detected]]

# This is to make sure that on startup, all known windows are moved to the main workspace
# away from the 'VITURE' monitor. which is not supposed to be used
# if.during-aerospace-startup = true
# run = 'move-node-to-workspace 1'  # Workspace 1 is pinned to 'main'


# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-ctrl-slash = 'layout tiles horizontal vertical'
    alt-ctrl-backslash = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-shift-h = 'focus left'
    alt-shift-j = 'focus down'
    alt-shift-k = 'focus up'
    alt-shift-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-ctrl-h = 'move left'
    alt-ctrl-j = 'move down'
    alt-ctrl-k = 'move up'
    alt-ctrl-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-ctrl-minus = 'resize smart -50'
    alt-ctrl-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-cmd-1 = 'workspace 1'
    alt-cmd-2 = 'workspace 2'
    alt-cmd-3 = 'workspace 3'
    alt-cmd-4 = 'workspace 4'
    alt-cmd-5 = 'workspace 5'
    alt-cmd-6 = 'workspace 6'
    alt-cmd-7 = 'workspace 7'
    alt-cmd-8 = 'workspace 8'
    alt-cmd-9 = 'workspace --wrap-around prev'
    alt-cmd-0 = 'workspace --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-ctrl-r = 'move-node-to-monitor --focus-follows-window --wrap-around prev'
    alt-ctrl-e = 'move-node-to-monitor --focus-follows-window --wrap-around next'
    alt-ctrl-1 = 'move-node-to-workspace 1'
    alt-ctrl-2 = 'move-node-to-workspace 2'
    alt-ctrl-3 = 'move-node-to-workspace 3'
    alt-ctrl-4 = 'move-node-to-workspace 4'
    alt-ctrl-5 = 'move-node-to-workspace 5'
    alt-ctrl-6 = 'move-node-to-workspace 6'
    alt-ctrl-7 = 'move-node-to-workspace 7'
    alt-ctrl-8 = 'move-node-to-workspace 8'
    alt-ctrl-9 = 'move-node-to-workspace --focus-follows-window --wrap-around prev'
    alt-ctrl-0 = 'move-node-to-workspace --focus-follows-window --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'

[[on-window-detected]]
if.app-id = "com.viture.spacewalker"
run = "layout floating"

[[on-window-detected]]
if.app-id = "org.openvpn.client.app"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.apple.finder"
run = "layout floating"

[[on-window-detected]]
if.app-id = "jp.naver.line.mac"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.microsoft.CompanyPortalMac"
run = "layout floating"

[[on-window-detected]]
if.app-id = "org.openvpn.client.app"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.macpaw.CleanMyMac4"
run = "layout floating"


# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    enter = 'mode main'
    r = 'flatten-workspace-tree' # reset layout
    f = 'layout floating tiling' # Toggle between floating and tiling layout
    cmd-backspace = ['close-all-windows-but-current', 'mode main']

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    slash = 'layout tiles horizontal vertical'
    backslash = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    h = 'focus left'
    j = 'focus down'
    k = 'focus up'
    l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    ctrl-h = 'move left'
    ctrl-j = 'move down'
    ctrl-k = 'move up'
    ctrl-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    minus = 'resize smart -50'
    equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'
    cmd-6 = 'workspace 6'
    cmd-7 = 'workspace 7'
    cmd-8 = 'workspace 8'
    cmd-9 = 'workspace --wrap-around prev'
    cmd-0 = 'workspace --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    ctrl-r = 'move-node-to-monitor --wrap-around prev'
    ctrl-e = 'move-node-to-monitor --wrap-around next'
    ctrl-1 = 'move-node-to-workspace 1'
    ctrl-2 = 'move-node-to-workspace 2'
    ctrl-3 = 'move-node-to-workspace 3'
    ctrl-4 = 'move-node-to-workspace 4'
    ctrl-5 = 'move-node-to-workspace 5'
    ctrl-6 = 'move-node-to-workspace 6'
    ctrl-7 = 'move-node-to-workspace 7'
    ctrl-8 = 'move-node-to-workspace 8'
    ctrl-9 = 'move-node-to-workspace --wrap-around prev'
    ctrl-0 = 'move-node-to-workspace --wrap-around next'

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-h = 'join-with left'
    alt-j = 'join-with down'
    alt-k = 'join-with up'
    alt-l = 'join-with right'

    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']

# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking
